  <text x="80" y="560" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#c8a96a" letter-spacing="2">RENEWABLE ENERGY · INFRASTRUCTURE · EUROPE &amp; INDIA</text>
